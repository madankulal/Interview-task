apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-demo
  template:
    metadata:
      labels:
        app: aks-demo
  volumeMounts:
- name: secrets-store
  mountPath: "/mnt/secrets"
  readOnly: true
  volumes:
- name: secrets-store
  csi:
    driver: secrets-store.csi.k8s.io
    readOnly: true
    volumeAttributes:
      secretProviderClass: "azure-kv-secret"
      volumes:
- name: secrets-store
  csi:
    driver: secrets-store.csi.k8s.io
    readOnly: true
    volumeAttributes:
      secretProviderClass: "azure-kv-secret"
      env:
- name: APP_MESSAGE
  valueFrom:
    secretKeyRef:
      name: azure-kv-secret
      key: APP-MESSAGE
    spec:
      containers:
      - name: aks-demo
        image: aksdevopsacr12345.azurecr.io/aks-demo:v1
        ports:
        - containerPort: 5000
