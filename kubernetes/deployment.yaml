apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-demo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aks-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aks-demo
  template:
    metadata:
      labels:
        app: aks-demo
    spec:
      containers:
      - name: aks-demo
        image: aksdevopsacr12345.azurecr.io/aks-demo:v1
        ports:
        - containerPort: 5000
     
        volumeMounts:
        - name: secrets-store
          mountPath: "/mnt/secrets"
          readOnly: true
  
        env:
        - name: APP_MESSAGE
          valueFrom:
            secretKeyRef:
              name: azure-kv-secret
              key: APP-MESSAGE

      volumes:
      - name: secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "azure-kv-secret"
