apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-kv-secret
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"   # ✅ IMPORTANT
    userAssignedIdentityID: ""     # leave empty for system identity
    keyvaultName: "aks-devops-kv"
    objects: |
      array:
        - |
          objectName: APP-MESSAGE
          objectType: secret
    tenantId: "8afe33fb-7e35-43bb-8e3a-e9c573d64c34"
