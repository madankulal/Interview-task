name: Build and Deploy to AKS

on:
  push:
    branches:
      - main

env:
  ACR_NAME: qdbhexawaredemo123
  IMAGE_NAME: aks-demo
  RESOURCE_GROUP: rg-dso-qdb
  AKS_CLUSTER: Qqddemocluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build Docker image
        run: |
          docker build -t $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} ./app

      - name: Push Docker image
        run: |
          docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group $RESOURCE_GROUP \
            --name $AKS_CLUSTER \
            --overwrite-existing

      - name: Transform secret-provider.yaml
        run: |
          sed -i "s|__CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID_FOR_KV }}|g" kubernetes/secret-provider.yaml
          sed -i "s|__TENANT_ID__|${{ secrets.AZURE_TENANT_ID }}|g" kubernetes/secret-provider.yaml

      - name: Update deployment image tag
        run: |
          sed -i "s|image: .*|image: $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}|g" kubernetes/deployment.yaml

      #  NEW STEP — DRY RUN VALIDATION
      - name: Validate Kubernetes manifests (Dry Run)
        run: |
          kubectl apply -f kubernetes/secret-provider.yaml --dry-run=server
          kubectl apply -f kubernetes/deployment.yaml --dry-run=server
          kubectl apply -f kubernetes/service.yaml --dry-run=server

      - name: Apply SecretProviderClass
        run: kubectl apply -f kubernetes/secret-provider.yaml

      - name: Apply Deployment
        run: kubectl apply -f kubernetes/deployment.yaml

      - name: Apply Service
        run: kubectl apply -f kubernetes/service.yaml

      - name: Verify rollout
        run: kubectl rollout status deployment/aks-demo

    # OPTIONAL 
      - name: Check Pods
        run: kubectl get pods
